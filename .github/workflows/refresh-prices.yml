name: Refresh prediction-market prices

on:
  schedule:
    # Run every 6 hours. (cron uses UTC.)
    - cron: '5 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run refresh script
        run: node scripts/refresh-prices.mjs

      - name: Commit and push if data changed
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No price changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "chore(data): refresh prediction-market prices ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
