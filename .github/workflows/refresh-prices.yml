name: Refresh data

on:
  schedule:
    # Polymarket: every 6 hours.
    - cron: '5 */6 * * *'
    # FEC: once a day at 12:30 UTC.
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which refresher to run'
        required: false
        default: 'all'
        type: choice
        options: [all, polymarket, fec]

permissions:
  contents: write

jobs:
  polymarket:
    if: github.event_name != 'workflow_dispatch' || inputs.job == 'all' || inputs.job == 'polymarket'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Refresh Polymarket prices
        run: node scripts/refresh-prices.mjs
      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No price changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase
          git add data/
          git commit -m "chore(data): refresh prediction-market prices ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push

  fec:
    # Run on the daily cron OR on manual dispatch. (The 6-hourly cron skips this.)
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'fec'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Refresh FEC finance data
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          # FEC_API_KEY is optional — DEMO_KEY works at 30 req/hour, plenty for
          # a few federal candidates. Real key (free at api.data.gov) raises
          # to 1000/hour.
          node scripts/refresh-finance-fec.mjs
      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No finance changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase
          git add data/
          git commit -m "chore(data): refresh FEC finance totals ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
