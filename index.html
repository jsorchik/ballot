<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ballot Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Ballot Builder</h1>
      <p class="breadcrumb" id="jurisdiction">—</p>
      <p class="districts-line" id="districts-line"></p>
    </div>
    <div class="pickers">
      <label class="picker">
        Jurisdiction
        <select id="jurisdiction-select"></select>
      </label>
      <label class="picker">
        Election
        <select id="election-select"></select>
      </label>
      <span class="last-updated" id="last-updated"></span>
    </div>
  </header>

  <div class="layout">
    <main class="races-pane">
      <section class="filters" aria-label="View options">
        <input id="search" type="search" placeholder="Search office or candidate name…" autocomplete="off" />
        <div class="filter-row">
          <div class="chips" id="level-chips" role="group" aria-label="Filter by level"></div>
        </div>
        <div class="filter-row">
          <label class="toggle"><input type="checkbox" id="show-minor" /> Show minor candidates</label>
          <label class="sort">
            Races
            <select id="sort-select">
              <option value="ballot">Ballot order</option>
              <option value="level">By level</option>
              <option value="contested">Most candidates first</option>
            </select>
          </label>
          <label class="sort">
            Candidates
            <select id="candidate-sort">
              <option value="default">Ballot order</option>
              <option value="chance">By win chance ↓</option>
              <option value="lean-prog">Most progressive first</option>
              <option value="lean-trad">Most traditional first</option>
            </select>
          </label>
        </div>
      </section>

      <div id="races"></div>
    </main>

    <aside class="ballot-pane" aria-label="My ballot">
      <div class="ballot-header">
        <h2>My Ballot</h2>
        <span class="count" id="ballot-count">0 / 0</span>
      </div>
      <ol id="ballot-list" class="ballot-list"></ol>
      <div class="ballot-actions">
        <button id="copy-ballot" type="button">Copy</button>
        <button id="print-ballot" type="button">Print</button>
        <button id="clear-ballot" type="button" class="danger">Clear</button>
      </div>
      <p class="ballot-note">Selections saved in this browser.</p>
    </aside>
  </div>

  <template id="tpl-race">
    <article class="race" data-race-id="">
      <header class="race-header">
        <div>
          <h3 class="race-office"></h3>
          <p class="race-meta"></p>
        </div>
        <span class="race-tag"></span>
      </header>
      <ul class="candidates"></ul>
    </article>
  </template>

  <template id="tpl-candidate">
    <li class="candidate">
      <label class="candidate-row">
        <input type="radio" name="" />
        <div class="candidate-main">
          <div class="candidate-line">
            <span class="candidate-name"></span>
            <span class="candidate-party"></span>
            <span class="candidate-incumbent" hidden>incumbent</span>
          </div>
          <div class="candidate-occupation"></div>
          <div class="candidate-scandal"></div>
          <div class="candidate-finance"></div>
        </div>
        <div class="candidate-metrics">
          <div class="candidate-chance metric" title=""></div>
          <div class="candidate-lean metric" title=""></div>
        </div>
      </label>
    </li>
  </template>

  <script src="app.js?v=17"></script>
</body>
</html>
